<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 660 150" role="img" aria-labelledby="logo-title logo-desc">
  <title id="logo-title">Dandelion Σύμβουλοι</title>
  <desc id="logo-desc">A refined dandelion flower moving gently in the wind.</desc>
  <style>
    .bloom{transform-box:fill-box;transform-origin:52% 100%;animation:wind-sway 4.8s ease-in-out infinite}
    .wind-seeds{transform-box:fill-box;transform-origin:50% 50%;animation:seed-drift 5.8s ease-in-out infinite}
    @keyframes wind-sway{0%,100%{transform:rotate(-7.4deg) translate(-2.2px,.4px)}50%{transform:rotate(-11.2deg) translate(-5px,-.9px)}}
    @keyframes seed-drift{0%,100%{transform:translate(0,0) rotate(-2deg);opacity:.9}50%{transform:translate(-5px,-2px) rotate(4deg);opacity:.68}}
    @media (prefers-reduced-motion:reduce){.bloom,.wind-seeds{animation:none}}
  </style>
  <defs>
    <g id="logo-ray" fill="none" stroke="currentColor" stroke-linecap="round"><path d="M67 75 67 40" stroke-width="1.45"/><path d="M67 40c-5-1-8-5-10-10M67 40c-2-5-2-9-1-13M67 40c2-5 5-9 9-12M67 40c5-2 9-4 12-7" stroke-width="1.05"/></g>
    <g id="wind-seed" fill="none" stroke="currentColor" stroke-linecap="round"><path d="M0 12 0 1" stroke-width="1.05"/><path d="M0 1c-3 0-5-2-6-5M0 1c-1-3-1-6 0-8M0 1c2-3 4-5 7-6" stroke-width=".8"/></g>
  </defs>
  <g color="#9b7b3f">
    <g class="wind-seeds" opacity=".78">
      <use href="#wind-seed" transform="translate(44 44) rotate(-62) scale(.78)"/>
      <use href="#wind-seed" transform="translate(31 57) rotate(-78) scale(.62)"/>
      <use href="#wind-seed" transform="translate(54 31) rotate(-46) scale(.54)"/>
    </g>
    <g class="bloom"><path d="M67 76c-7 19-13 38-10 63" fill="none" stroke="currentColor" stroke-width="4.5" stroke-linecap="round"/>
      <use href="#logo-ray"/><use href="#logo-ray" transform="rotate(22.5 67 75)"/><use href="#logo-ray" transform="rotate(45 67 75)"/><use href="#logo-ray" transform="rotate(67.5 67 75)"/><use href="#logo-ray" transform="rotate(90 67 75)"/><use href="#logo-ray" transform="rotate(112.5 67 75)"/><use href="#logo-ray" transform="rotate(135 67 75)"/><use href="#logo-ray" transform="rotate(157.5 67 75)"/><use href="#logo-ray" transform="rotate(180 67 75)"/><use href="#logo-ray" transform="rotate(202.5 67 75)"/><use href="#logo-ray" transform="rotate(225 67 75)"/><use href="#logo-ray" transform="rotate(247.5 67 75)"/><use href="#logo-ray" transform="rotate(270 67 75)"/><use href="#logo-ray" transform="rotate(292.5 67 75)"/><use href="#logo-ray" transform="rotate(315 67 75)"/><use href="#logo-ray" transform="rotate(337.5 67 75)"/><circle cx="67" cy="75" r="7" fill="currentColor"/>
    </g>
  </g>
  <g fill="#29322b"><text x="150" y="79" font-family="Georgia, 'Times New Roman', serif" font-size="47" letter-spacing="5.5">DANDELION</text><text id="brand-subtitle" x="152" y="111" font-family="Arial, sans-serif" font-size="15" letter-spacing="8.5">ΣΥΜΒΟΥΛΟΙ</text></g>
</svg>
