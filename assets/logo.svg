<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 660 150" role="img" aria-labelledby="logo-title logo-desc">
  <title id="logo-title">Dandelion Σύμβουλοι</title>
  <desc id="logo-desc">A refined dandelion with five seeds drifting to the upper right.</desc>
  <style>
    .bloom{transform-box:fill-box;transform-origin:center;animation:breathe 6s ease-in-out infinite}.seed{transform-box:fill-box;transform-origin:center;animation:float 7s ease-in-out infinite}.s2{animation-delay:-1.1s}.s3{animation-delay:-2.2s}.s4{animation-delay:-3.3s}.s5{animation-delay:-4.4s}
    svg:hover .seed,.is-hovered .seed{animation:drift 3.4s cubic-bezier(.2,.55,.35,1) both}svg:hover .s2,.is-hovered .s2{animation-delay:.12s}svg:hover .s3,.is-hovered .s3{animation-delay:.24s}svg:hover .s4,.is-hovered .s4{animation-delay:.36s}svg:hover .s5,.is-hovered .s5{animation-delay:.48s}
    @keyframes breathe{50%{transform:scale(1.012) rotate(.35deg)}}@keyframes float{50%{transform:translate(0,-1px) rotate(1deg)}}@keyframes drift{0%{opacity:.92;transform:translate(-9px,7px) rotate(-5deg)}72%{opacity:.65}100%{opacity:0;transform:translate(18px,-15px) rotate(9deg)}}@media (prefers-reduced-motion:reduce){.bloom,.seed,svg:hover .seed,.is-hovered .seed{animation:none}}
  </style>
  <defs>
    <g id="logo-ray" fill="none" stroke="currentColor" stroke-linecap="round"><path d="M67 75 67 40" stroke-width="1.45"/><path d="M67 40c-5-1-8-5-10-10M67 40c-2-5-2-9-1-13M67 40c2-5 5-9 9-12M67 40c5-2 9-4 12-7" stroke-width="1.05"/></g>
    <g id="flying" fill="none" stroke="currentColor" stroke-linecap="round"><path d="M0 0 16-13" stroke-width="1.25"/><path d="M16-13c-5-1-8-4-10-8M16-13c-2-4-1-8 0-11M16-13c3-4 6-7 10-8M16-13c4-1 8-1 11 0" stroke-width=".95"/><path d="M-2 2c2 0 4-1 5-3" stroke-width="2.6"/></g>
  </defs>
  <g color="#9b7b3f">
    <g class="bloom"><path d="M67 76c-1 19-7 37-4 63" fill="none" stroke="currentColor" stroke-width="4.5" stroke-linecap="round"/>
      <use href="#logo-ray"/><use href="#logo-ray" transform="rotate(22.5 67 75)"/><use href="#logo-ray" transform="rotate(45 67 75)"/><use href="#logo-ray" transform="rotate(67.5 67 75)"/><use href="#logo-ray" transform="rotate(90 67 75)"/><use href="#logo-ray" transform="rotate(112.5 67 75)"/><use href="#logo-ray" transform="rotate(135 67 75)"/><use href="#logo-ray" transform="rotate(157.5 67 75)"/><use href="#logo-ray" transform="rotate(180 67 75)"/><use href="#logo-ray" transform="rotate(202.5 67 75)"/><use href="#logo-ray" transform="rotate(225 67 75)"/><use href="#logo-ray" transform="rotate(247.5 67 75)"/><use href="#logo-ray" transform="rotate(270 67 75)"/><use href="#logo-ray" transform="rotate(292.5 67 75)"/><use href="#logo-ray" transform="rotate(315 67 75)"/><use href="#logo-ray" transform="rotate(337.5 67 75)"/><circle cx="67" cy="75" r="7" fill="currentColor"/>
    </g>
    <g class="seed s1" transform="translate(105 47) rotate(-8)"><use href="#flying"/></g><g class="seed s2" transform="translate(131 35) rotate(-15) scale(.9)"><use href="#flying"/></g><g class="seed s3" transform="translate(153 22) rotate(-22) scale(.78)"><use href="#flying"/></g><g class="seed s4" transform="translate(122 16) rotate(-5) scale(.68)"><use href="#flying"/></g><g class="seed s5" transform="translate(177 10) rotate(-18) scale(.58)"><use href="#flying"/></g>
  </g>
  <g fill="#29322b"><text x="208" y="79" font-family="Georgia, 'Times New Roman', serif" font-size="47" letter-spacing="5.5">DANDELION</text><text x="210" y="111" font-family="Arial, sans-serif" font-size="15" letter-spacing="8.5">ΣΥΜΒΟΥΛΟΙ</text></g>
</svg>
